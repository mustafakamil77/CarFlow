{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between">
  <h1 class="text-xl font-bold text-gray-900">System Configuration Settings</h1>
</div>
<div class="mt-6 flex flex-col lg:flex-row gap-6">
  <div class="w-full lg:w-64 bg-white rounded-lg shadow-sm p-4 h-fit">
    <nav class="flex flex-col space-y-1">
      <a class="px-4 py-2.5 bg-blue-50 text-blue-600 font-medium text-sm rounded-md">Company Profile</a>
      <a class="px-4 py-2.5 text-gray-700 hover:bg-gray-50 font-medium text-sm rounded-md">Notification Preferences</a>
      <a class="px-4 py-2.5 text-gray-700 hover:bg-gray-50 font-medium text-sm rounded-md">User Roles & Permissions</a>
      <a class="px-4 py-2.5 text-gray-700 hover:bg-gray-50 font-medium text-sm rounded-md">Integration Settings</a>
    </nav>
  </div>
  <div class="flex-1 bg-white rounded-lg shadow-sm p-8">
    <div class="mb-8">
      <h2 class="text-xl font-bold text-gray-900">Company Profile</h2>
    </div>
    <div class="space-y-8">
      <section>
        <h3 class="text-lg font-bold text-gray-900 mb-6">General Information</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
            <input class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm py-2 px-3" type="text" value="Company Name">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contact Person</label>
            <input class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm py-2 px-3" type="text" value="John Blenner">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
            <textarea class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm py-2 px-3" rows="4">4203 Lintastrain Suite 100
Company, NC 93103</textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm py-2 px-3" type="email" value="gecrirprorre@gmail.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
            <input class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm py-2 px-3" type="text" value="+1 (313) 225-9700">
          </div>
        </div>
      </section>
      <section class="mt-8">
        <h3 class="text-lg font-bold text-gray-900 mb-6">Branding</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Company Logo</label>
            <button class="mt-1 inline-flex items-center px-4 py-2 bg-white border border-gray-300 rounded-md font-medium text-sm text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" type="button">Upload logo</button>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Primary color</label>
            <div class="mt-1">
              <button class="inline-flex items-center px-3 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white">Choose color</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>
{% endblock %}
