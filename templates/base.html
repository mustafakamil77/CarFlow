<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarFlow - Fleet Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','sans-serif'] },
      colors: { sidebar: '#1e293b', main: '#f1f5f9' }
    }
  }
}
</script>
{% if debug %}
<link rel="stylesheet" href="{% static 'css/base.css' %}">
<link rel="stylesheet" href="{% static 'css/layout.css' %}">
{% else %}
<link rel="stylesheet" href="{% static 'css/base.min.css' %}">
<link rel="stylesheet" href="{% static 'css/layout.min.css' %}">
{% endif %}
{% block extra_css %}{% endblock %}
<style>
body{font-family:'Inter',sans-serif;background-color:#f3f4f6}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex h-[100dvh] md:h-screen overflow-hidden bg-main bg-slate-100">
<div id="sidebar-backdrop" class="fixed inset-0 bg-black/30 z-30 hidden md:hidden"></div>
{% include "partials/sidebar.html" %}
<div class="flex-1 flex flex-col h-full overflow-hidden">
{% include "partials/navbar.html" %}
<main class="flex-1 overflow-x-hidden overflow-y-auto bg-main p-4 sm:p-6 lg:p-8">
{% block content %}{% endblock %}
</main>
</div>
<script type="module" src="{% static 'js/app.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
