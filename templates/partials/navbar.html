<header class="h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8 bg-white shadow-sm z-10">
<div class="flex items-center gap-3">
<button id="sidebarToggle" class="md:hidden inline-flex items-center justify-center h-10 w-10 rounded-md border border-slate-200 text-slate-700 hover:bg-slate-50">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
</button>
<h1 class="text-base sm:text-xl font-semibold text-slate-800 truncate max-w-[60vw] md:max-w-none">Professional Fleet Management Dashboard</h1>
</div>
<div class="flex items-center space-x-4">
<button class="text-slate-500 hover:text-slate-700 focus:outline-none">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<div class="flex items-center gap-3 border-l border-slate-200 pl-4 relative">
    
    <!-- زر المستخدم -->
    <button id="user-menu-btn" class="flex items-center gap-3 focus:outline-none">
        
        <div class="text-right hidden sm:block">
            <p class="text-sm font-semibold text-slate-800">
                {{ request.user.get_full_name|default:request.user.username }}
            </p>
            <p class="text-xs text-slate-500">
                {% if request.user.groups.first %}
                    {{ request.user.groups.first.name }}
                {% else %}
                    User
                {% endif %}
            </p>
        </div>

        <!-- Avatar -->
        <div class="h-10 w-10 rounded-full bg-slate-300 flex items-center justify-center text-white font-semibold text-sm border-2 border-slate-100">
            {{ request.user.username|slice:":2"|upper }}
        </div>
    </button>

    <!-- Dropdown -->
    <div id="user-dropdown" class="hidden absolute right-0 top-12 w-48 bg-white rounded-lg shadow-lg border border-slate-200">
        <a href="#" class="block px-4 py-2 text-sm hover:bg-slate-100">Profile</a>
        <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit" 
        class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-slate-100">
        Logout
    </button>
</form>
    </div>

</div>
</header>
<script>
    const btn = document.getElementById('user-menu-btn');
    const dropdown = document.getElementById('user-dropdown');

    btn.addEventListener('click', () => {
        dropdown.classList.toggle('hidden');
    });

    // إغلاق عند الضغط خارجه
    document.addEventListener('click', (e) => {
        if (!btn.contains(e.target)) {
            dropdown.classList.add('hidden');
        }
    });
</script>
