{% extends "base.html" %}
{% block content %}
<div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
  <section class="max-w-2xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    <h1 class="text-xl font-bold text-gray-800 mb-2">Add Condition</h1>
    <p class="text-sm text-gray-600 mb-6">Fill the form and save the condition.</p>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex items-center justify-end gap-3 pt-2">
        <button type="submit" class="tap-target rounded-md bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700">
          Save
        </button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
