<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Condition</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white rounded-xl shadow-sm ring-1 ring-gray-200">
            <div class="px-6 py-5 border-b border-gray-100">
                <h1 class="text-xl sm:text-2xl font-semibold text-gray-900">Add Condition</h1>
                <p class="mt-1 text-sm text-gray-600">Fill the form and save the condition.</p>
            </div>
            <div class="px-6 py-6">
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    <div class="prose prose-sm max-w-none">
                        <div class="space-y-4">
                            {{ form.as_p }}
                        </div>
                    </div>
                    <div class="flex items-center justify-end gap-3">
                        <button type="submit" class="inline-flex items-center justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
