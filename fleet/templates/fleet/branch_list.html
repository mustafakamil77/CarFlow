{% extends "base.html" %}
{% block content %}
<div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">
  <section class="bg-transparent mb-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
      <div>
        <h1 class="text-xl sm:text-2xl font-semibold text-gray-900">الفروع</h1>
        <p class="mt-1 text-sm text-gray-600">
          عدد النتائج:
          <span id="branch-results-count" class="font-semibold text-gray-900">{{ filtered_count|default:paginator.count|default:0 }}</span>
        </p>
      </div>
      <a href="{% url 'fleet:branch_create' %}" class="tap-target text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none shadow-sm flex-shrink-0 inline-flex items-center justify-center">إضافة فرع</a>
    </div>
  </section>

  <section class="mb-6">
    <form id="branch-filters-form" method="get" class="bg-white rounded-lg shadow border border-gray-200 p-4 space-y-4">
      <div class="flex flex-col lg:flex-row lg:items-end gap-3">
        <div class="flex-1 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
          <div class="space-y-1">
            <label class="text-xs font-medium text-gray-500" for="q">بحث</label>
            <input id="q" class="block w-full p-2.5 text-sm text-gray-900 border border-gray-300 rounded-lg bg-white focus:ring-blue-500 focus:border-blue-500 shadow-sm" name="q" value="{{ request.GET.q|default:'' }}" placeholder="بحث باسم الفرع أو الاسم القانوني أو العنوان..." type="text">
          </div>

          <details class="rounded-lg border border-gray-200 bg-gray-50 p-3">
            <summary class="cursor-pointer text-sm font-semibold text-gray-800">المنطقة</summary>
            <div class="mt-3 space-y-2 max-h-52 overflow-auto pr-1">
              {% for r in regions %}
                <label class="flex items-center gap-2 text-sm text-gray-700">
                  <input type="checkbox" name="region" value="{{ r.pk }}" class="h-4 w-4" {% if r.pk|stringformat:"s" in selected_regions %}checked{% endif %}>
                  <span>{{ r.name }}</span>
                </label>
              {% endfor %}
            </div>
          </details>

          <details class="rounded-lg border border-gray-200 bg-gray-50 p-3">
            <summary class="cursor-pointer text-sm font-semibold text-gray-800">القسم</summary>
            <div class="mt-3 space-y-2 max-h-52 overflow-auto pr-1">
              {% for d in departments %}
                <label class="flex items-center gap-2 text-sm text-gray-700">
                  <input type="checkbox" name="department" value="{{ d.pk }}" class="h-4 w-4" {% if d.pk|stringformat:"s" in selected_departments %}checked{% endif %}>
                  <span>{{ d.name_ar|default:d.code }}</span>
                </label>
              {% endfor %}
            </div>
          </details>

          <details class="rounded-lg border border-gray-200 bg-gray-50 p-3">
            <summary class="cursor-pointer text-sm font-semibold text-gray-800">مميزات</summary>
            <div class="mt-3 space-y-2">
              <label class="flex items-center gap-2 text-sm text-gray-700">
                <input type="checkbox" name="feature" value="qr_enabled" class="h-4 w-4" {% if 'qr_enabled' in selected_features %}checked{% endif %}>
                <span>QR مفعل</span>
              </label>
            </div>
          </details>

          <div class="flex items-end gap-2">
            <button type="button" id="clear-filters" class="w-full text-gray-700 bg-gray-100 hover:bg-gray-200 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-4 py-2.5 focus:outline-none shadow-sm border border-gray-300">مسح الكل</button>
            <button type="submit" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2.5 focus:outline-none shadow-sm">تطبيق</button>
          </div>
        </div>
      </div>
    </form>
  </section>

  <div id="branch-results" class="space-y-4">
    {% include "fleet/_branch_list_results.html" %}
  </div>
</div>

<script>
(() => {
  const form = document.getElementById("branch-filters-form");
  const resultsEl = document.getElementById("branch-results");
  const countEl = document.getElementById("branch-results-count");
  const clearBtn = document.getElementById("clear-filters");
  if (!form || !resultsEl || !countEl) return;

  let debounceId = null;
  let abortController = null;

  const buildParams = () => {
    const fd = new FormData(form);
    const params = new URLSearchParams();
    for (const [k, v] of fd.entries()) {
      if (v !== null && String(v).trim() !== "") params.append(k, v);
    }
    params.set("ajax", "1");
    return params;
  };

  const applyToUrl = () => {
    const fd = new FormData(form);
    const params = new URLSearchParams();
    for (const [k, v] of fd.entries()) {
      if (v !== null && String(v).trim() !== "") params.append(k, v);
    }
    const newUrl = `${window.location.pathname}?${params.toString()}`;
    window.history.replaceState({}, "", newUrl);
  };

  const fetchResults = async () => {
    if (abortController) abortController.abort();
    abortController = new AbortController();
    const params = buildParams();
    try {
      const res = await fetch(`${window.location.pathname}?${params.toString()}`, {
        headers: { "X-Requested-With": "XMLHttpRequest" },
        signal: abortController.signal,
      });
      const data = await res.json();
      resultsEl.innerHTML = data.html || "";
      countEl.textContent = String(data.count ?? 0);
      applyToUrl();
    } catch (e) {
      if (e && e.name === "AbortError") return;
    }
  };

  const debouncedFetch = () => {
    clearTimeout(debounceId);
    debounceId = setTimeout(fetchResults, 250);
  };

  form.addEventListener("submit", (ev) => {
    ev.preventDefault();
    fetchResults();
  });
  form.addEventListener("change", () => debouncedFetch());
  const qInput = document.getElementById("q");
  if (qInput) qInput.addEventListener("input", () => debouncedFetch());

  resultsEl.addEventListener("click", (ev) => {
    const a = ev.target.closest("a");
    if (!a) return;
    if (a.getAttribute("data-page-link") !== "1") return;
    ev.preventDefault();
    const url = new URL(a.href);
    const page = url.searchParams.get("page");
    if (!page) return;
    const fd = new FormData(form);
    const params = new URLSearchParams();
    for (const [k, v] of fd.entries()) {
      if (v !== null && String(v).trim() !== "") params.append(k, v);
    }
    params.set("page", page);
    params.set("ajax", "1");
    fetch(`${window.location.pathname}?${params.toString()}`, { headers: { "X-Requested-With": "XMLHttpRequest" } })
      .then(r => r.json())
      .then(data => {
        resultsEl.innerHTML = data.html || "";
        countEl.textContent = String(data.count ?? 0);
        params.delete("ajax");
        window.history.replaceState({}, "", `${window.location.pathname}?${params.toString()}`);
      });
  });

  if (clearBtn) {
    clearBtn.addEventListener("click", () => {
      form.reset();
      Array.from(form.querySelectorAll('input[type="checkbox"]')).forEach(cb => cb.checked = false);
      fetchResults();
    });
  }
})();
</script>
{% endblock %}
