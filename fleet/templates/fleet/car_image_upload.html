{% extends "base.html" %}
{% block content %}
<div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
  <section class="max-w-2xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    <h1 class="text-xl font-bold text-gray-800 mb-6">Upload Car Image</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="flex items-center justify-end gap-3 pt-2">
        <button type="submit" class="tap-target rounded-md bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">Save</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
