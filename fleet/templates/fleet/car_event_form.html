{% extends "base.html" %}
{% block content %}
<div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
  <section class="max-w-2xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200 p-8">
    <h1 class="text-xl font-bold text-gray-800 mb-6">Add Car Event</h1>
    <div class="mb-4 text-sm text-gray-600">
      <span class="font-medium">Car:</span>
      <span class="ml-1">{{ car.plate_number }} — {{ car.brand }} {{ car.model }} ({{ car.year }})</span>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Event Type</label>
          {{ form.event_type }}
        </div>
        <div class="space-y-1">
          <label class="block text-sm font-semibold text-gray-700">Odometer</label>
          {{ form.odometer }}
        </div>
        <div class="space-y-1 md:col-span-2">
          <label class="block text-sm font-semibold text-gray-700">Notes</label>
          {{ form.notes }}
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 pt-6">
        <a href="{% url 'fleet:car_detail' car.pk %}" class="rounded-md bg-white px-5 py-2.5 text-sm font-semibold text-gray-700 border border-gray-300 shadow-sm hover:bg-gray-50">Cancel</a>
        <button type="submit" class="rounded-md bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-700">Add Event</button>
      </div>
    </form>
  </section>
</div>
{% endblock %}
