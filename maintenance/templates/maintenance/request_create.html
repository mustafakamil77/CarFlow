{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto">
  <h1 class="text-2xl font-bold">Create Request</h1>
  <form method="post" class="mt-4 bg-white p-4 rounded border">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-4">
      <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>
      <a href="{% url 'maintenance:request_list' %}" class="ml-2 px-4 py-2 border rounded">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
