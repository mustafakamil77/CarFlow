{% extends "base.html" %}
{% block content %}
<div class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar">
  <section class="bg-white rounded-lg shadow border border-gray-200 p-4 sm:p-5 mb-6">
    <div class="flex flex-col xl:flex-row gap-4 xl:items-end justify-between">
      <form id="filters-form" method="get" class="flex flex-col gap-4 flex-1">
        <div class="flex flex-col lg:flex-row gap-3 lg:items-end lg:flex-nowrap">
          <div class="w-full lg:flex-1 min-w-[280px]">
            <label class="text-xs font-medium text-gray-500 mb-1 ml-1 block" for="q">بحث</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg aria-hidden="true" class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
              </div>
              <input id="q" class="block w-full p-2.5 pl-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-white focus:ring-blue-500 focus:border-blue-500 shadow-sm" name="q" value="{{ request.GET.q }}" placeholder="مثال: منتهي الدمام / صيانة كهرباء / 123" type="text">
            </div>
          </div>
          <div class="w-full lg:w-56">
            <label class="text-xs font-medium text-gray-500 mb-1 ml-1 block" for="department-filter">القسم</label>
            <select class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-sm" id="department-filter" name="department">
              <option value="">كل الأقسام</option>
              {% for d in departments %}
                <option value="{{ d.pk }}" {% if effective_department == d.pk|stringformat:"s" %}selected{% endif %}>{{ d }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="w-full lg:w-56">
            <label class="text-xs font-medium text-gray-500 mb-1 ml-1 block" for="status-filter">الحالة</label>
            <select class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-sm" id="status-filter" name="status">
              <option value="">كل الحالات</option>
              <option value="new" {% if effective_status == 'new' %}selected{% endif %}>جديد</option>
              <option value="approved" {% if effective_status == 'approved' %}selected{% endif %}>معتمد</option>
              <option value="in_progress" {% if effective_status == 'in_progress' %}selected{% endif %}>قيد التنفيذ</option>
              <option value="completed" {% if effective_status == 'completed' %}selected{% endif %}>منتهي</option>
            </select>
          </div>
          <div class="w-full lg:w-56">
            <label class="text-xs font-medium text-gray-500 mb-1 ml-1 block" for="region-filter">المنطقة</label>
            <select class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-sm" id="region-filter" name="region">
              <option value="">كل المناطق</option>
              {% for r in regions %}
                <option value="{{ r.pk }}" {% if effective_region == r.pk|stringformat:"s" %}selected{% endif %}>{{ r.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="w-full lg:w-auto">
            <label class="text-xs font-medium text-gray-500 mb-1 ml-1 block">&nbsp;</label>
            <label class="inline-flex items-center gap-2 rounded-lg border border-gray-200 bg-gray-50 px-3 py-2.5 text-sm text-gray-700 select-none">
              <input id="include-completed" type="checkbox" name="include_completed" value="1" {% if include_completed %}checked{% endif %} class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
              عرض المنتهية
            </label>
          </div>
          <div class="flex items-end gap-2">
            <button type="submit" class="text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none shadow-sm transition-colors">تطبيق</button>
            <a href="{% url 'maintenance:branch_request_list' %}" class="text-gray-700 bg-gray-100 hover:bg-gray-200 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 focus:outline-none shadow-sm transition-colors border border-gray-300 flex items-center justify-center">مسح</a>
          </div>
        </div>
      </form>

      <div class="flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-end">
        <div class="text-xs text-gray-500">
          <span class="inline-flex items-center gap-2 rounded-full bg-gray-50 px-3 py-1 border border-gray-200">
            <span class="h-2 w-2 rounded-full bg-gray-400"></span>
            <span id="results-count">{{ page_obj.paginator.count }}</span> نتيجة
          </span>
        </div>
      </div>
    </div>
  </section>

  <div id="results">
    {% include "maintenance/_branch_request_list_results.html" %}
  </div>
</div>

<script>
  (function () {
    const form = document.getElementById("filters-form");
    const results = document.getElementById("results");
    const countEl = document.getElementById("results-count");
    let debounceTimer = null;
    let inFlight = null;

    function buildUrlFromForm(extraParams) {
      const url = new URL(window.location.href);
      url.search = "";
      const params = new URLSearchParams(new FormData(form));
      params.delete("page");
      for (const [k, v] of Object.entries(extraParams || {})) {
        params.set(k, v);
      }
      url.search = params.toString();
      return url;
    }

    async function refresh(extraParams) {
      const url = buildUrlFromForm(Object.assign({ ajax: "1" }, extraParams || {}));

      if (inFlight) {
        inFlight.abort();
      }
      inFlight = new AbortController();

      const resp = await fetch(url.toString(), {
        method: "GET",
        credentials: "same-origin",
        headers: { "X-Requested-With": "XMLHttpRequest" },
        signal: inFlight.signal,
      });

      if (!resp.ok) return;
      const data = await resp.json();

      results.innerHTML = data.html;
      countEl.textContent = data.count ?? "";

      const cleanUrl = buildUrlFromForm(extraParams || {});
      window.history.replaceState({}, "", cleanUrl.toString());
    }

    function debounceRefresh() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => refresh({}), 300);
    }

    form.addEventListener("submit", function (ev) {
      ev.preventDefault();
      refresh({});
    });

    form.querySelectorAll("select, input[type='checkbox']").forEach((el) => {
      el.addEventListener("change", debounceRefresh);
    });

    const q = document.getElementById("q");
    if (q) q.addEventListener("input", debounceRefresh);

    results.addEventListener("click", function (ev) {
      const link = ev.target.closest("a[data-page-link]");
      if (!link) return;
      ev.preventDefault();
      const page = new URL(link.href).searchParams.get("page");
      refresh({ page: page || "1" });
    });
  })();
</script>
{% endblock %}
